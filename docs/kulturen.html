<!DOCTYPE html>
<html lang="de" class="web">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kulturen – Aethelgard</title>
  <link rel="stylesheet" href="./assets/css/variables.css">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="web">

  <div id="app">
    <div class="cultures-page">

      <nav class="landing-topnav">
        <a class="landing-logo" href="index.html">Aethelgard</a>
        <div class="topnav-links">
          <a id="nav-cultures" class="topnav-link active" href="kulturen.html"></a>
          <a id="nav-calling"  class="topnav-link" href="heldenpfad.html"></a>
          <a id="nav-world"    class="topnav-link" href="welt.html"></a>
          <a id="nav-back"     class="topnav-link" href="index.html"></a>
        </div>
        <div class="topnav-actions">
          <button id="lang-toggle" class="btn-wow-outline btn-topnav"></button>
        </div>
      </nav>

      <div class="cultures-hero">
        <h1 id="page-title" class="hero-title"></h1>
        <p  id="page-subtitle" class="hero-subtitle"></p>
      </div>

      <div class="cultures-detail-section">
        <div id="cultures-detail-grid" class="cultures-detail-grid"></div>
      </div>

      <footer class="landing-footer">
        <span id="footer-text"></span>
      </footer>

    </div>
  </div>

  <script type="module">
    import { t, initLangToggle } from './assets/js/i18n.js';

    const CULTURES = [
      { slug: 'kaiserliche', name: 'Kaiserliche', img: 'imperial.png',     attrs: 'Ausgeglichen',                lp: '30', mana: '0',  desc: 'Die Erben der alten Reiche im Zentrum Aethelgards. Diszipliniert, stolz und dem Gesetz des Lichtbringers treu. Ihre Rüstungen tragen die Adler-Schwingen Solans.' },
      { slug: 'skjaldar',    name: 'Skjaldar',    img: 'skjaldar.png',     attrs: 'KO+2, KK+1, MU+1, KL-1',     lp: '35', mana: '0',  desc: 'Kinder der Stürme und Fjorde. Ein Volk von Seefahrern, die den Tod nicht fürchten, solange sie mit dem Schwert in der Hand fallen.' },
      { slug: 'zahiri',      name: 'Zahiri',      img: 'zahiri002.png',    attrs: 'IN+1, CH+1, KL+1, KO-1',     lp: '28', mana: '5',  desc: 'Wanderer der ewigen Dünen. Sie hüten das Wissen der Sterne und beherrschen die flüsternde Magie des Sandes.' },
      { slug: 'felsenzwerge',name: 'Felsenzwerge',img: 'rockdwarf.png',    attrs: 'KO+2, KK+1, GE-1, CH-1',     lp: '35', mana: '0',  desc: 'Tief in den Wurzeln der Welt schmieden sie den besten Stahl Aethelgards. Starrköpfig wie der Stein, in dem sie leben.' },
      { slug: 'tiefenzwerge',name: 'Tiefenzwerge',img: 'deepdwarf.png',    attrs: 'KO+1, KK+1, KL+1, GE-1',     lp: '32', mana: '0',  desc: 'Die Bewahrer der Runen und der Geschichte. Sie graben tiefer als alle anderen nach den Geheimnissen der Erde.' },
      { slug: 'feynir',      name: 'Feynir',      img: 'feynir.png',       attrs: 'IN+2, GE+1, KK-1',            lp: '30', mana: '0',  desc: 'Ein Naturvolk der weiten Steppen und Wälder. Sie bewegen sich wie Schatten und sprechen die Sprache der Woelfe.' },
      { slug: 'lichtalben',  name: 'Lichtalben',  img: 'lightelf.png',     attrs: 'KL+2, IN+1, CH+1, KO-2',     lp: '26', mana: '15', desc: 'Einstige Herrscher ueber die Aetherwinde. Ihre Aura ist strahlend, doch ihre Herzen sind oft so kuehl wie das Sternenlicht.' },
      { slug: 'nachtalben',  name: 'Nachtalben',  img: 'darknightelf.png', attrs: 'MU+1, KL+1, GE+2, CH-2',     lp: '28', mana: '10', desc: 'Sie waehlten die Dunkelheit unter den Bergen und die verbotenen Pfade der Magie. Gejagt, gefuerchtet und gnadenlos.' },
      { slug: 'nordfolk',    name: 'Nordfolk',    img: 'nordfolk.png',     attrs: 'KO+1, KK+1',                  lp: '32', mana: '0',  desc: 'Durch den ewigen Winter abgehaertete Krieger und Jaeger des hohen Nordens. Ueberleben ist keine Frage des Willens, sondern des Instinkts.' },
      { slug: 'suedbund',    name: 'Suedbund',    img: 'suedbund.png',     attrs: 'KL+1, CH+1',                  lp: '28', mana: '0',  desc: 'Diplomaten, Gelehrte und Haendler - das kulturelle Herz Aethelgards. Wer Wissen als Waffe begreift, ist unter ihnen zu Hause.' },
      { slug: 'wurzelvolk',  name: 'Wurzelvolk',  img: 'wurzelvolk.png',   attrs: 'KO+3, KK+2, GE-2, CH-1',     lp: '40', mana: '0',  desc: 'Uralte lebende Baumwesen, die seit Aeonen die Waelder von Yldra bewachen.' },
      { slug: 'gnomolk',     name: 'Gnomolk',     img: 'gnomolk.png',      attrs: 'KL+3, FF+2, IN+1, KK-2, KO-1',lp: '26', mana: '0',  desc: 'Kleine bipedale Eisbaerwesen, kaum einen Meter gross, mit einem Hang zu Dampfmaschinen und unbeirrbarem Selbstvertrauen.' },
    ];

    function render() {
      document.getElementById('nav-cultures').textContent = t('nav', 'cultures');
      document.getElementById('nav-calling').textContent  = t('nav', 'calling');
      document.getElementById('nav-world').textContent    = t('nav', 'world');
      document.getElementById('nav-back').textContent     = t('nav', 'back');
      document.getElementById('page-title').textContent   = t('cultures', 'title');
      document.getElementById('page-subtitle').textContent= t('cultures', 'subtitle');
      document.getElementById('footer-text').textContent  = t('cultures', 'footer');
      document.getElementById('lang-toggle').textContent  = t('nav', 'toggle');

      const grid = document.getElementById('cultures-detail-grid');
      grid.innerHTML = '';
      CULTURES.forEach(c => {
        const card = document.createElement('div');
        card.className = 'culture-detail-card';
        card.id = c.slug;
        card.innerHTML = `
          <div class="cdc-img-wrap">
            <img src="./assets/images/cultures/${c.img}" alt="${c.name}" class="cdc-img" loading="lazy">
          </div>
          <div class="cdc-body">
            <h2 class="cdc-name">${c.name}</h2>
            <p class="cdc-desc">${c.desc}</p>
            <div class="cdc-stats">
              <span class="cdc-stat"><em>${t('cultures','attrs')}:</em> ${c.attrs}</span>
              <span class="cdc-stat"><em>${t('cultures','lep')}:</em> ${c.lp} | <em>${t('cultures','mana')}:</em> ${c.mana}</span>
            </div>
          </div>`;
        grid.appendChild(card);
      });
    }

    initLangToggle(render);
    render();
  </script>

</body>
</html>
